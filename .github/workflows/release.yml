name: Build & Release DNS-SHIELD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ── Build binaries for all platforms ────────────────────────────────────────
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/dns-shield${{ matrix.ext }} \
            ./cmd/shield

      - name: Package Linux/macOS
        if: matrix.os != 'windows'
        run: |
          cd dist
          tar -czf dns-shield_${{ matrix.os }}_${{ matrix.arch }}.tar.gz dns-shield
          rm dns-shield

      - name: Package Windows
        if: matrix.os == 'windows'
        run: |
          cd dist
          zip dns-shield_windows_${{ matrix.arch }}.zip dns-shield.exe
          rm dns-shield.exe

      - uses: actions/upload-artifact@v4
        with:
          name: dns-shield_${{ matrix.os }}_${{ matrix.arch }}
          path: dist/

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: SHA-256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: DNS-SHIELD ${{ github.ref_name }}
          body: |
            ## DNS-SHIELD ${{ github.ref_name }} 🛡️

            Privacy-first DNS filtering — built for Canada 🇨🇦

            ### Install in one command

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | sudo bash
            ```

            **Windows** — Download `install.bat` below and run as Administrator.

            **Docker:**
            ```bash
            docker run -d \
              --name dns-shield \
              -p 53:53/udp -p 53:53/tcp \
              -p 853:853/tcp \
              -p 8080:8080 \
              -e SHIELD_ADMIN_TOKEN=change-me \
              ghcr.io/${{ github.repository }}:latest
            ```

            ### Downloads
            | Platform | File |
            |---|---|
            | Linux x86_64 | `dns-shield_linux_amd64.tar.gz` |
            | Linux ARM64 | `dns-shield_linux_arm64.tar.gz` |
            | macOS Intel | `dns-shield_darwin_amd64.tar.gz` |
            | macOS Apple Silicon | `dns-shield_darwin_arm64.tar.gz` |
            | Windows x64 | `dns-shield_windows_amd64.zip` |

            Verify integrity with `checksums.txt` (SHA-256).
          files: |
            dist/*
            install.sh
            install.bat
          draft: false
          prerelease: false

  # ── Build & push Docker image ────────────────────────────────────────────────
  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
